global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: sre-reliability-platform
    environment: local

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: fastapi

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
