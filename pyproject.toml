[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["terraform", "load-testing"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = ["E501"]  # line length handled by ruff format; avoid noisy long-string flags

[tool.ruff.lint.per-file-ignores]
"app/tests/*" = ["B017"]  # allow broad exception assertions in tests if any

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["app/tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
