name: AWS deployment

# Manual-only deployment via workflow_dispatch. Uses GitHub OIDC to assume a
# short-lived IAM role; no long-lived AWS access keys are stored as secrets.
#
# Required repository configuration:
#   - Environments: "dev" and "prod" (prod should require reviewers/approval)
#   - Secrets/Variables per environment:
#       AWS_ROLE_ARN       -> ARN of the GitHub Actions IAM role (from bootstrap)
#       AWS_REGION         -> e.g. us-east-1
#   - Variables (not secret):
#       TF_VAR_ami_id      -> Amazon Linux 2023 AMI id for the region
#       TF_VAR_ecr_image   -> ECR image URI to deploy
#       TF_VAR_alert_email -> alerting email (optional)
#   - Secret (sensitive):
#       TF_VAR_redis_auth_token -> Redis AUTH token (preferrably fetched from
#                                  Secrets Manager at runtime in a real pipeline)
#   - Backend: state bucket + DynamoDB lock table created by terraform/bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, prod]
      action:
        description: "Terraform action"
        required: true
        type: choice
        default: plan
        options: [plan, apply]

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write      # required for OIDC
      contents: read
    defaults:
      run:
        working-directory: terraform/environments/${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: gh-actions-sre-deploy
      - name: Terraform init
        run: terraform init -backend-config=backend.hcl
      - name: Terraform validate
        run: terraform validate
      - name: Terraform plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -no-color -out=tfplan
      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
      - name: Post-deploy health check
        if: github.event.inputs.action == 'apply'
        run: |
          echo "ALB DNS is available in Terraform outputs:"
          terraform output -raw alb_dns_name
          # curl health once the deployment is reachable:
          # curl -fsS "http://$(terraform output -raw alb_dns_name)/health" || true
      - name: Rollback documentation
        if: github.event.inputs.action == 'apply'
        run: |
          echo "## Rollback" >> $GITHUB_STEP_SUMMARY
          echo "If health checks fail after apply:" >> $GITHUB_STEP_SUMMARY
          echo "1. Re-run this workflow with action=plan to inspect the prior state." >> $GITHUB_STEP_SUMMARY
          echo "2. Pin TF_VAR_ecr_image to the last known-good image tag." >> $GITHUB_STEP_SUMMARY
          echo "3. Re-run workflow_dispatch with action=apply to roll back the image." >> $GITHUB_STEP_SUMMARY
          echo "4. For infra regressions, use 'terraform state' / targeted apply." >> $GITHUB_STEP_SUMMARY
