name: Security scans

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          mkdir -p /tmp/gl
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp/gl
          find /tmp/gl -name gitleaks -type f -exec cp {} /usr/local/bin/gitleaks \;
          chmod +x /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks (fail on detected secrets)
        run: gitleaks detect --source . --no-banner --exit-code 1

  pip-audit:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: app } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt --strict