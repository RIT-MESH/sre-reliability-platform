name: Docker build and scan

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["app/**", "docker-compose.yml", ".github/workflows/docker.yml"]
  pull_request:
    paths: ["app/**", "docker-compose.yml", ".github/workflows/docker.yml"]

jobs:
  build-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build app image
        run: docker build -t sre-platform:ci ./app
      - name: Validate docker-compose
        run: docker compose config -q
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version
      - name: Trivy container scan (fail on fixable HIGH/CRITICAL)
        run: |
          trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress sre-platform:ci
