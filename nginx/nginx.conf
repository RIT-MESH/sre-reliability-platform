# Nginx reverse proxy for the local Docker Compose stack.
# Compresses responses, adds caching headers for product endpoints and
# forwards the request-id header for correlation.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json
        '{"time":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$http_x_request_id"}';
    access_log /var/log/nginx/access.log json;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css application/xml;

    upstream app_backend {
        least_conn;
        server app:8000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Health probes pass straight through (no caching).
        location ~ ^/(health|ready|metrics)$ {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Product listing: short public cache, longer on detail.
        location /products {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "public, max-age=30" always;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
        }

        # Default: forward everything else.
        location / {
            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $http_x_request_id;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout 10s;
        }
    }
}
